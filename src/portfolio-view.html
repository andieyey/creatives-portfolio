<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio - Craftfolio</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
        }
        
        .loading-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .loading-spinner {
            text-align: center;
            color: white;
        }
        
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 4px solid white;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .error-screen {
            display: none;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }
        
        .error-box {
            background: white;
            border-radius: 16px;
            padding: 40px;
            max-width: 500px;
            text-align: center;
        }
        
        .error-box h1 {
            margin: 0 0 16px 0;
            font-size: 2rem;
        }
        
        .error-box p {
            margin: 0 0 24px 0;
            color: #64748b;
        }
        
        .error-box a {
            display: inline-block;
            padding: 12px 24px;
            background: #6366f1;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-spinner">
            <div class="spinner"></div>
            <p>Loading portfolio...</p>
        </div>
    </div>
    
    <div class="error-screen" id="errorScreen">
        <div class="error-box">
            <h1>Portfolio Not Found</h1>
            <p>This portfolio doesn't exist or has been removed.</p>
            <a href="/">Create Your Own Portfolio</a>
        </div>
    </div>
    
    <!-- Portfolio content will be injected here -->
    <div id="portfolioContent"></div>
    
    <script>
        // Simply redirect to editor.html with the ID
        // This allows the editor.js to handle the view mode properly
        (function() {
            const pathParts = window.location.pathname.split('/');
            const portfolioId = pathParts[pathParts.length - 1] || pathParts[pathParts.length - 2];
            
            if (portfolioId && portfolioId !== 'p') {
                // Redirect to editor.html with just the ID (no token = public view)
                window.location.href = `editor.html?id=${portfolioId}`;
            } else {
                // No ID found, show error
                showError();
            }
        })();
        
        function showError() {
            document.getElementById('loadingScreen').style.display = 'none';
            document.getElementById('errorScreen').style.display = 'flex';
        }
    </script>
</body>
</html>
